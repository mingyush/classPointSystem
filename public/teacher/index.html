<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师管理 - 班级积分管理系统</title>
    
    <!-- Fresh Classroom Fonts: Nunito Sans & Varela Round -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700;800;900&family=Varela+Round&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#ECFEFF', // Very light cyan background
                            100: '#CFFAFE',
                            200: '#A5F3FC',
                            300: '#67E8F9',
                            400: '#22D3EE', // Secondary
                            500: '#06B6D4', // Primary Cyan
                            600: '#0891B2',
                            700: '#0E7490',
                            800: '#155E75',
                            900: '#164E63', // Darkest Text
                            950: '#083344',
                        },
                        accent: {
                            400: '#4ADE80',
                            500: '#22C55E', // CTA Green
                            600: '#16A34A',
                            700: '#15803D',
                        }
                    },
                    fontFamily: {
                        sans: ['"Nunito Sans"', "system-ui", "sans-serif"],
                        display: ['"Varela Round"', "system-ui", "sans-serif"],
                    }
                }
            }
        }
    </script>

    <!-- Fallback CSS for existing scripts & animations -->
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/menu.css">

    <style>
        /* Vibrant Tech Block Style */
        .clay-panel {
            background: #ffffff;
            border-radius: 20px;
            border: 4px solid #164E63;
            box-shadow: 6px 6px 0px rgba(22, 78, 99, 1);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .clay-header {
            background: #ffffff;
            border-bottom: 4px solid #164E63;
            box-shadow: 0 6px 0px -2px rgba(22, 78, 99, 1);
        }
        /* Custom Scrollbar for heavy data tables */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #ECFEFF; border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: #67E8F9; border-radius: 5px; border: 2px solid #ECFEFF; }
        ::-webkit-scrollbar-thumb:hover { background: #22D3EE; }

        body {
            background-color: #ECFEFF;
            color: #164E63;
            min-height: 100vh;
            background-image:
              radial-gradient(
                circle at 15% 50%,
                rgba(6, 182, 212, 0.08),
                transparent 25%
              ),
              radial-gradient(
                circle at 85% 30%,
                rgba(34, 197, 94, 0.08),
                transparent 25%
              );
            background-attachment: fixed;
        }

        /* Minimal overrides to disable old global styles */
        .teacher-container {
            all: unset;
        }
    </style>
</head>
<body class="font-sans antialiased text-brand-950 flex flex-col min-h-screen selection:bg-brand-200 selection:text-brand-900">
    
    <header class="clay-header sticky top-0 z-50 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4 transition-all duration-300">
        <div class="flex flex-col md:flex-row items-center gap-2 md:gap-6 w-full md:w-auto">
            <h1 class="text-xl md:text-2xl font-display font-bold tracking-tight text-brand-700 flex items-center gap-2">
                <svg class="w-6 h-6 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                教师管理面板
            </h1>
            <div id="userInfo" class="flex items-center gap-2 text-sm font-bold text-brand-600">
                <svg class="w-4 h-4 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                <span class="user-name">未登录</span>
            </div>
        </div>
        <div class="flex flex-wrap items-center justify-center gap-3">
            <button id="modeToggle" class="px-5 py-2 text-sm font-black uppercase rounded-lg bg-white hover:bg-brand-50 text-brand-900 border-4 border-brand-900 shadow-[4px_4px_0px_rgba(22,78,99,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_rgba(22,78,99,1)] active:translate-y-1 active:shadow-[0px_0px_0px_rgba(22,78,99,1)] transition-all flex items-center gap-2 focus:outline-none">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                切换上课模式
            </button>
            <a href="/display" class="px-5 py-2 text-sm font-black uppercase rounded-lg bg-[#22C55E] hover:bg-[#16A34A] text-white border-4 border-brand-900 shadow-[4px_4px_0px_rgba(22,78,99,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_rgba(22,78,99,1)] active:translate-y-1 active:shadow-[0px_0px_0px_rgba(22,78,99,1)] transition-all focus:outline-none">大屏展示</a>
            <a href="/" class="px-5 py-2 text-sm font-black uppercase rounded-lg bg-white hover:bg-brand-50 text-brand-900 border-4 border-brand-900 shadow-[4px_4px_0px_rgba(22,78,99,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_rgba(22,78,99,1)] active:translate-y-1 active:shadow-[0px_0px_0px_rgba(22,78,99,1)] transition-all focus:outline-none">返回首页</a>
            <button id="logoutBtn" class="px-5 py-2 text-sm font-black uppercase rounded-lg bg-[#FCA5A5] hover:bg-[#F87171] text-[#7F1D1D] border-4 border-[#7F1D1D] shadow-[4px_4px_0px_rgba(127,29,29,1)] hover:-translate-y-1 hover:shadow-[6px_6px_0px_rgba(127,29,29,1)] active:translate-y-1 active:shadow-[0px_0px_0px_rgba(127,29,29,1)] transition-all flex items-center gap-2 focus:outline-none">
                退出登录
            </button>
        </div>
    </header>
    
    <main id="teacherContent" class="flex-grow p-4 md:p-6 lg:p-8 max-w-[1920px] w-full mx-auto">
        <!-- 内容将通过JavaScript动态加载 -->
        <div class="flex items-center justify-center h-64">
            <div class="loading text-brand-600 flex items-center gap-3 text-lg font-bold">
                <svg class="animate-spin h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                正在加载数据...
            </div>
        </div>
    </main>
    
    <script src="/js/common.js"></script>
    <script src="/js/menu.js"></script>
    <script src="/js/feedback.js"></script>
    <script src="/js/teacher.js"></script>
</body>
</html>
