version: '3.8'

services:
  classroom-points:
    build: .
    container_name: classroom-points-system
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_TYPE=sqlite
      - DB_PATH=/app/data/classroom_points.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./backups:/app/backups
      - ./config/production.json:/app/config/config.json:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - classroom-network
    depends_on:
      - db-backup

  # SQLite 数据库备份服务
  db-backup:
    image: alpine:latest
    container_name: classroom-points-backup
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./backups:/backups
    command: >
      sh -c "
        apk add --no-cache sqlite dcron &&
        echo '0 2 * * * sqlite3 /data/classroom_points.db \".backup /backups/classroom_points_\$$(date +%Y%m%d_%H%M%S).db\"' | crontab - &&
        echo '0 3 * * 0 find /backups -name \"classroom_points_*.db\" -mtime +30 -delete' | crontab - &&
        crond -f
      "
    networks:
      - classroom-network

  # 可选：Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: classroom-points-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/usr/share/nginx/html/static:ro
    depends_on:
      - classroom-points
    networks:
      - classroom-network
    profiles:
      - nginx

networks:
  classroom-network:
    driver: bridge

volumes:
  classroom-data:
    driver: local
  classroom-logs:
    driver: local
  classroom-backups:
    driver: local